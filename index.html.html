<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mes Recettes">
<title>Mes Recettes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --border: #EBEBEB;
    --text: #1A1A1A;
    --muted: #888;
    --accent: #E8602C;
    --accent-light: #FDF1EC;
    --pill-bg: #F2F2F0;
    --pill-active: #E8602C;
    --pill-active-text: #fff;
    --radius: 14px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 10px;
  }

  .header h1 span { color: var(--accent); }

  .search-bar {
    display: flex;
    align-items: center;
    background: var(--pill-bg);
    border-radius: 10px;
    padding: 8px 12px;
    gap: 8px;
  }

  .search-bar input {
    border: none;
    background: transparent;
    font-size: 15px;
    width: 100%;
    outline: none;
    color: var(--text);
  }

  .search-bar input::placeholder { color: var(--muted); }

  .search-icon { color: var(--muted); font-size: 14px; flex-shrink: 0; }

  /* CATEGORY PILLS */
  .categories {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 12px 16px;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .categories::-webkit-scrollbar { display: none; }

  .pill {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    background: var(--pill-bg);
    color: var(--text);
    cursor: pointer;
    border: none;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }

  .pill.active {
    background: var(--pill-active);
    color: var(--pill-active-text);
  }

  /* RECIPE LIST */
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 16px 16px 6px;
  }

  .recipe-list {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .recipe-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 13px 14px;
    gap: 10px;
    border: 1px solid var(--border);
    transition: background 0.1s;
  }

  .recipe-item:first-child { border-radius: var(--radius) var(--radius) 4px 4px; }
  .recipe-item:last-child { border-radius: 4px 4px var(--radius) var(--radius); }
  .recipe-item:only-child { border-radius: var(--radius); }

  .recipe-item + .recipe-item { border-top: none; border-radius: 4px; }
  .recipe-item:last-child { border-radius: 4px 4px var(--radius) var(--radius); }

  .recipe-name {
    font-size: 15px;
    font-weight: 450;
    flex: 1;
    line-height: 1.3;
  }

  .recipe-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

  .btn-link {
    background: var(--accent-light);
    color: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }

  .btn-delete {
    background: none;
    border: none;
    color: #CCC;
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  .btn-delete:hover { color: #E53935; }

  .no-link {
    color: var(--muted);
    font-size: 12px;
    font-style: italic;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 15px;
  }

  /* FAB - ADD BUTTON */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 28px;
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(232,96,44,0.4);
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 40px;
    width: 100%;
    max-width: 500px;
    transform: translateY(30px);
    transition: transform 0.25s ease;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 18px; }

  .modal label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 6px;
    margin-top: 14px;
  }

  .modal input, .modal select {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 15px;
    outline: none;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.15s;
  }

  .modal input:focus, .modal select:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }

  .btn-cancel {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
  }

  .btn-save {
    flex: 2;
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  /* COUNT BADGE */
  .count-badge {
    font-size: 12px;
    color: var(--muted);
    padding: 0 16px 8px;
  }
</style>
</head>

<div class="header">
  <h1>🍽 Mes <span>Recettes</span></h1>
  <div class="search-bar">

  </div>
</div>

<div class="categories" id="categoryBar"></div>

<div id="app"></div>

<button class="fab" onclick="openModal()">＋ Ajouter</button>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>Nouvelle recette</h2>

    <input type="text" id="inputName" placeholder="Ex : Lasagne courgette">

      <option value="🍲 Plats uniques" selected>🍲 Plats uniques</option>
      <option value="🍰 Desserts">🍰 Desserts</option>
    </select>
    <label>Lien (optionnel)</label>
    <input type="url" id="inputUrl" placeholder="https://…">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveRecipe()">Ajouter</button>
    </div>
  </div>
</div>

// STATE
let activeCat = 'Tout';
let recipes = [];

function loadRecipes() {
  try {
    const stored = localStorage.getItem('mes_recettes_v2');
    if (stored) {
      recipes = JSON.parse(stored);
    } else {
      recipes = DEFAULT_RECIPES.map(r => ({...r}));
      save();
    }
  } catch(e) {
    recipes = DEFAULT_RECIPES.map(r => ({...r}));
  }
}

function save() {
  try { localStorage.setItem('mes_recettes_v2', JSON.stringify(recipes)); } catch(e) {}
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const app = document.getElementById('app');

  let filtered = recipes;
  if (activeCat !== 'Tout') filtered = filtered.filter(r => r.cat === activeCat);
  if (q) filtered = filtered.filter(r => r.name.toLowerCase().includes(q));

  if (filtered.length === 0) {
    app.innerHTML = '<div class="empty">Aucune recette trouvée 🍽</div>';
    return;
  }

  // Group by category
  const groups = {};
  filtered.forEach(r => {
    if (!groups[r.cat]) groups[r.cat] = [];
    groups[r.cat].push(r);
  });

  let html = '';
  const catOrder = CATEGORIES.filter(c => groups[c]);

  catOrder.forEach(cat => {
    const items = groups[cat];
    if (activeCat === 'Tout') {
      html += `<div class="section-title">${cat} <span style="font-weight:400;color:#BBB">(${items.length})</span></div>`;
    }
    html += '<div class="recipe-list">';
    items.forEach(r => {
      const linkBtn = r.url
        ? `<a class="btn-link" href="${r.url}" target="_blank">Voir →</a>`
        : `<span class="no-link">pas de lien</span>`;
      html += `
        <div class="recipe-item">
          <span class="recipe-name">${r.name}</span>
          <div class="recipe-actions">
            ${linkBtn}
            <button class="btn-delete" onclick="deleteRecipe('${r.id}')" title="Supprimer">×</button>
          </div>
        </div>`;
    });
    html += '</div>';
  });

  // Count
  html = `<div class="count-badge">${filtered.length} recette${filtered.length > 1 ? 's' : ''}</div>` + html;
  app.innerHTML = html;
}

function renderCategories() {
  const bar = document.getElementById('categoryBar');
  const allCats = ['Tout', ...CATEGORIES];
  bar.innerHTML = allCats.map(c => {
    const label = c === 'Tout' ? 'Tout' : c;
    return `<button class="pill ${activeCat === c ? 'active' : ''}" onclick="setCategory('${c}')">${label}</button>`;
  }).join('');
}

function setCategory(cat) {
  activeCat = cat;
  renderCategories();
  render();
}

function deleteRecipe(id) {
  recipes = recipes.filter(r => r.id !== id);
  save();
  render();
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('inputName').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('inputName').value = '';
  document.getElementById('inputUrl').value = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveRecipe() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) { document.getElementById('inputName').focus(); return; }
  const cat = document.getElementById('inputCat').value;
  const url = document.getElementById('inputUrl').value.trim();
  const id = 'u' + Date.now();
  recipes.push({ id, cat, name, url });
  save();
  closeModal();
  setCategory(cat);
  render();
}

// INIT
loadRecipes();
renderCategories();
render();
</script>
